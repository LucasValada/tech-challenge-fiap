apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: oficina
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
# NodePort allows direct access to Postgres from the host for debugging.
# Maps to host port defined in Kind extra_port_mappings (var.db_host_port, default 5432).
apiVersion: v1
kind: Service
metadata:
  name: postgres-nodeport
  namespace: oficina
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
  type: NodePort
