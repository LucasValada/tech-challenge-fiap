# One-shot Job that runs Prisma migrations before the main Deployment starts.
# Replace IMAGE_PLACEHOLDER with the actual image tag before applying:
#   sed "s|IMAGE_PLACEHOLDER|ghcr.io/org/repo:sha-abc1234|g" 03-migration-job.yaml | kubectl apply -f -
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: oficina
  labels:
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait until PostgreSQL is accepting connections before running migrations
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres.oficina.svc.cluster.local 5432; do
                echo "waiting for postgres..."; sleep 3
              done
      containers:
        - name: migrate
          image: IMAGE_PLACEHOLDER
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
