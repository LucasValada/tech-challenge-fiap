services:
  postgres:
    image: postgres:17
    container_name: oficina-postgres
    restart: always
    environment:
      POSTGRES_USER: ${OFICINA_USER}
      POSTGRES_PASSWORD: ${OFICINA_PASSWORD}
      POSTGRES_DB: ${OFICINA_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OFICINA_USER} -d ${OFICINA_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    image: node:18
    container_name: oficina-api
    build:
      context: ./
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      APPLICATION_PORT: 3000
      DATABASE_URL: postgresql://${OFICINA_USER}:${OFICINA_PASSWORD}@postgres:5432/${OFICINA_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}

      MAIL_FROM: ${MAIL_FROM}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_PORT: ${MAIL_PORT}
    command: sh -c "npm run start:prod"
    ports:
      - ${APPLICATION_PORT}:3000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: